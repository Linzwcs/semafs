<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="treeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3eaf7c"/>
      <stop offset="100%" style="stop-color:#42b983"/>
    </linearGradient>
  </defs>

  <!-- Tree trunk -->
  <rect x="58" y="80" width="12" height="30" rx="2" fill="#8B6914"/>

  <!-- Tree foliage (layered triangles) -->
  <polygon points="64,15 30,55 98,55" fill="url(#treeGrad)"/>
  <polygon points="64,30 25,75 103,75" fill="url(#treeGrad)"/>
  <polygon points="64,45 20,95 108,95" fill="url(#treeGrad)"/>

  <!-- Node dots representing semantic organization -->
  <circle cx="64" cy="35" r="4" fill="white" opacity="0.9"/>
  <circle cx="50" cy="55" r="3" fill="white" opacity="0.8"/>
  <circle cx="78" cy="55" r="3" fill="white" opacity="0.8"/>
  <circle cx="40" cy="75" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="64" cy="75" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="88" cy="75" r="2.5" fill="white" opacity="0.7"/>

  <!-- Connection lines -->
  <line x1="64" y1="39" x2="50" y2="52" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="64" y1="39" x2="78" y2="52" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="58" x2="40" y2="72" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="58" x2="64" y2="72" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="78" y1="58" x2="88" y2="72" stroke="white" stroke-width="1" opacity="0.4"/>
</svg>
